<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>武汉美食人格测试 · 过早摊</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", sans-serif;
        background: linear-gradient(145deg, #2a1e0f 0%, #3d2b14 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 16px 12px;
      }

      .app {
        max-width: 500px;
        width: 100%;
        background: #fef7e9;
        border-radius: 48px 48px 32px 32px;
        box-shadow:
          0 20px 40px rgba(0, 0, 0, 0.3),
          0 0 0 2px #c9a87c inset;
        overflow: hidden;
        padding: 24px 16px 32px;
        position: relative;
      }

      /* 装饰 */
      .app::before {
        content: "🥢";
        position: absolute;
        top: 16px;
        right: 20px;
        font-size: 40px;
        opacity: 0.15;
        transform: rotate(25deg);
      }

      .app::after {
        content: "🍜";
        position: absolute;
        bottom: 10px;
        left: 16px;
        font-size: 50px;
        opacity: 0.1;
        transform: rotate(-15deg);
      }

      h1 {
        font-size: 32px;
        font-weight: 800;
        color: #4a2c0f;
        text-align: center;
        margin-bottom: 4px;
        letter-spacing: 2px;
        text-shadow: 3px 3px 0 #e8c48a;
        position: relative;
        z-index: 2;
      }

      .subtitle {
        text-align: center;
        color: #7a5a3a;
        font-size: 16px;
        font-weight: 500;
        margin-bottom: 20px;
        border-bottom: 2px dashed #c9a87c;
        padding-bottom: 16px;
        position: relative;
        z-index: 2;
      }

      .subtitle span {
        background: #a8351f;
        color: #fef7e9;
        padding: 4px 12px;
        border-radius: 30px;
        font-size: 14px;
        margin: 0 4px;
      }

      /* 进度条 */
      .progress-container {
        background: #d9c2a7;
        height: 8px;
        border-radius: 20px;
        margin-bottom: 20px;
        overflow: hidden;
        position: relative;
        z-index: 2;
      }

      .progress-bar {
        height: 100%;
        background: #a8351f;
        width: 0%;
        border-radius: 20px;
        transition: width 0.3s ease;
        box-shadow: 0 0 6px #e06b4a;
      }

      .progress-text {
        text-align: right;
        font-size: 13px;
        color: #7a5a3a;
        margin-top: 4px;
        margin-bottom: 8px;
        font-weight: 500;
      }

      /* 题目卡片 */
      .question-card {
        background: #fff9ef;
        border-radius: 32px;
        padding: 28px 20px 20px;
        box-shadow:
          0 10px 0 #8b5e2e,
          0 4px 12px rgba(0, 0, 0, 0.1);
        border: 2px solid #c9a87c;
        margin-bottom: 20px;
        position: relative;
        z-index: 2;
      }

      .q-num {
        position: absolute;
        top: -14px;
        left: 24px;
        background: #a8351f;
        color: white;
        font-weight: bold;
        padding: 4px 18px;
        border-radius: 40px;
        font-size: 16px;
        box-shadow: 0 4px 0 #631e0e;
        border: 2px solid #fef7e9;
      }

      .q-text {
        font-size: 20px;
        font-weight: 700;
        color: #3d2b14;
        margin-bottom: 24px;
        line-height: 1.4;
      }
      .options {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .option {
        background: #f4e8d8;
        border: 2px solid #b6926e;
        border-radius: 60px;
        padding: 16px 20px;
        font-size: 16px;
        color: #3d2b14;
        font-weight: 500;
        text-align: left;
        cursor: pointer;
        transition: all 0.15s;
        box-shadow: 0 4px 0 #7a5a3a;
        line-height: 1.4;
      }

      .option:hover {
        background: #ecdcc8;
        transform: translateY(-1px);
        box-shadow: 0 5px 0 #7a5a3a;
      }

      .option.selected {
        background: #a8351f;
        border-color: #631e0e;
        color: white;
        box-shadow: 0 4px 0 #4f170a;
      }

      .nav-buttons {
        display: flex;
        gap: 12px;
        margin-top: 8px;
        position: relative;
        z-index: 2;
      }

      .btn {
        flex: 1;
        padding: 16px;
        border-radius: 60px;
        font-weight: 700;
        font-size: 18px;
        border: none;
        background: #c9a87c;
        color: #3d2b14;
        cursor: pointer;
        box-shadow: 0 6px 0 #7a5a3a;
        border: 2px solid #e8c48a;
        transition: all 0.1s;
        text-align: center;
      }

      .btn:active {
        transform: translateY(4px);
        box-shadow: 0 2px 0 #7a5a3a;
      }

      .btn.primary {
        background: #a8351f;
        color: white;
        border-color: #d9624a;
        box-shadow: 0 6px 0 #631e0e;
      }

      .btn:disabled {
        opacity: 0.5;
        transform: none;
        box-shadow: 0 4px 0 #7a5a3a;
        cursor: not-allowed;
      }

      /* 结果卡片 */
      .result-card {
        background: #fff9ef;
        border-radius: 36px;
        padding: 30px 18px 20px;
        box-shadow:
          0 12px 0 #8b5e2e,
          0 4px 16px rgba(0, 0, 0, 0.15);
        border: 3px solid #c9a87c;
        text-align: center;
        position: relative;
        z-index: 2;
      }

      .food-badge {
        font-size: 42px;
        font-weight: 900;
        color: #a8351f;
        text-shadow: 3px 3px 0 #e8c48a;
        margin-bottom: 6px;
        letter-spacing: 4px;
      }

      .food-sub {
        color: #7a5a3a;
        font-weight: 600;
        margin-bottom: 20px;
        border-bottom: 2px dotted #c9a87c;
        padding-bottom: 14px;
      }

      /* 纯 CSS 美食图 (结果展示区) */
      .food-illustration {
        width: 100%;
        min-height: 140px;
        margin: 10px 0 16px;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      /* 每道菜独立绘制 */
      .css-food {
        width: 100%;
        max-width: 280px;
        margin: 0 auto;
        position: relative;
      }

      /* 热干面 */
      .food-reganmian {
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .bowl {
        width: 180px;
        height: 90px;
        background: #e0c9a6;
        border-radius: 0 0 100px 100px;
        border: 5px solid #b68b5c;
        border-top: none;
        position: relative;
        box-shadow:
          inset 0 8px 0 #c9a87c,
          0 8px 0 #7a5a3a;
      }
      .noodles {
        width: 160px;
        height: 50px;
        background: #d4a43a;
        border-radius: 40% 40% 30% 30%;
        margin: -25px auto 0;
        box-shadow:
          0 -4px 0 #b8862d,
          inset 0 4px 8px #f3d27e;
        position: relative;
        z-index: 2;
      }
      .noodles::before {
        content: "🥢";
        font-size: 36px;
        position: absolute;
        right: -18px;
        top: -18px;
        transform: rotate(25deg);
      }
      .sesame {
        width: 90px;
        height: 18px;
        background: #5c3e1f;
        margin: 6px auto 0;
        border-radius: 20px;
        opacity: 0.8;
      }

      /* 糊汤粉 */
      .food-hutangfen .bowl {
        background: #f5e6d3;
      }
      .food-hutangfen .noodles {
        background: #f3e1c2;
        box-shadow: 0 -4px 0 #d9b382;
      }
      .soup {
        width: 140px;
        height: 12px;
        background: #d69c4a;
        border-radius: 10px;
        margin: -8px auto 4px;
        opacity: 0.6;
      }

      /* 苕面窝 */
      .food-shaomianwo .donut {
        width: 120px;
        height: 120px;
        background: #d99e4c;
        border-radius: 50%;
        margin: 0 auto;
        box-shadow:
          0 10px 0 #a56e2a,
          inset 0 0 0 12px #f5c78a;
        border: 6px solid #b57a32;
        position: relative;
      }
      .food-shaomianwo .donut::after {
        content: "🍠";
        font-size: 48px;
        position: absolute;
        top: 20px;
        left: 30px;
      }

      /* 生烫牛肉粉 */
      .food-beefnoodles .bowl {
        background: #c9a87c;
      }
      .beef-slices {
        display: flex;
        gap: 8px;
        justify-content: center;
        margin-top: 8px;
      }
      .beef {
        width: 35px;
        height: 22px;
        background: #9e3a2b;
        border-radius: 20px;
        box-shadow: inset 0 2px 4px #c96b5a;
      }

      /* 欢喜坨 */
      .food-huanxituo .ball {
        width: 100px;
        height: 100px;
        background: #e8b45a;
        border-radius: 50%;
        margin: 0 auto;
        box-shadow:
          0 8px 0 #a56e2a,
          inset 0 -6px 0 #f3d27e;
        position: relative;
      }
      .food-huanxituo .ball::after {
        content: "⚪";
        font-size: 60px;
        color: #f7e3b4;
        position: absolute;
        left: 20px;
        top: 12px;
      }

      /* 糯米鸡 */
      .food-nuomiji .lump {
        width: 110px;
        height: 80px;
        background: #bf8f4a;
        border-radius: 50% 50% 40% 40%;
        margin: 0 auto;
        box-shadow:
          0 8px 0 #8b5e2e,
          inset 0 -4px 0 #e8c48a;
      }

      /* 汽水包 */
      .food-qishuibao .bun {
        width: 120px;
        height: 60px;
        background: #deb887;
        border-radius: 50%;
        margin: 0 auto;
        box-shadow: 0 8px 0 #8b5e2e;
      }

      /* 三鲜豆皮 */
      .food-doupi .square {
        width: 130px;
        height: 100px;
        background: #e0a63b;
        margin: 0 auto;
        border-radius: 16px;
        box-shadow:
          0 8px 0 #8b5e2e,
          inset 0 0 0 6px #f5c78a;
      }

      /* 糯米包油条 */
      .food-nuomibaoyoutiao .roll {
        width: 160px;
        height: 50px;
        background: #e8cfb0;
        border-radius: 30px;
        margin: 0 auto;
        box-shadow: 0 8px 0 #b68b5c;
        position: relative;
      }
      .food-nuomibaoyoutiao .roll::after {
        content: "~~~~";
        font-size: 30px;
        letter-spacing: 6px;
        color: #5c3e1f;
        position: absolute;
        left: 30px;
        top: 8px;
      }

      /* 米粑粑 */
      .food-mibaba .pair {
        display: flex;
        gap: 8px;
        justify-content: center;
      }
      .food-mibaba .cake {
        width: 60px;
        height: 60px;
        background: #f5deb3;
        border-radius: 50%;
        box-shadow:
          0 6px 0 #b68b5c,
          inset 0 -4px 0 #fff0d4;
      }
      /* 蛋酒 */
      .food-danjiu .cup {
        width: 80px;
        height: 100px;
        background: #d9c2a7;
        border-radius: 0 0 40px 40px;
        margin: 0 auto;
        box-shadow:
          inset 0 16px 0 #f3e1c2,
          0 8px 0 #7a5a3a;
      }

      /* 鸡冠饺 */
      .food-jiguanjiao .cockscomb {
        width: 130px;
        height: 70px;
        background: #d9a54e;
        border-radius: 50% 50% 0 50%;
        margin: 0 auto;
        box-shadow: 0 8px 0 #8b5e2e;
        transform: rotate(-5deg);
      }

      /* 长沙臭豆腐 */
      .food-stinkytofu .tofu-block {
        width: 100px;
        height: 40px;
        background: #2b2b2b;
        margin: 20px auto;
        box-shadow:
          0 8px 0 #111,
          inset 0 0 0 4px #3a3a3a;
      }

      /* 汤包 */
      .food-tangbao .basket {
        width: 130px;
        height: 50px;
        background: #b68b5c;
        border-radius: 20px;
        margin: 0 auto;
        box-shadow: 0 8px 0 #7a5a3a;
      }

      /* 重油烧梅 */
      .food-shaomei .siu-mai {
        width: 80px;
        height: 50px;
        background: #e8cfb0;
        border-radius: 40% 40% 20% 20%;
        margin: 0 auto;
        box-shadow: 0 8px 0 #a56e2a;
      }

      /* 排骨藕汤 */
      .food-ou-tang .pot {
        width: 140px;
        height: 90px;
        background: #4a2c0f;
        border-radius: 30px 30px 20px 20px;
        margin: 0 auto;
        box-shadow:
          inset 0 20px 0 #7a5a3a,
          0 8px 0 #2a1e0f;
      }

      .desc {
        background: #f4e8d8;
        padding: 18px 16px;
        border-radius: 28px;
        font-size: 15px;
        color: #3d2b14;
        margin: 20px 0 12px;
        border: 2px solid #c9a87c;
        line-height: 1.6;
        text-align: left;
      }

      .wuhan-slang {
        background: #a8351f;
        color: #fef7e9;
        padding: 14px 16px;
        border-radius: 40px;
        font-weight: 600;
        font-size: 16px;
        margin: 12px 0;
        border: 2px solid #631e0e;
        text-align: center;
      }

      .restart-btn {
        width: 100%;
        margin-top: 16px;
      }

      .hidden {
        display: none !important;
      }

      .footer {
        text-align: center;
        margin-top: 16px;
        color: #8b5e2e;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <h1>🥢 你是哪道 <br />武汉味道？</h1>
      <div class="subtitle">
        <span>活结</span> <span>蒜鸟</span> <span>蛮扎实</span>
      </div>

      <!-- 测试区域 -->
      <div id="quizSection">
        <div class="progress-container">
          <div class="progress-bar" id="progressBar" style="width: 5%"></div>
        </div>
        <div class="progress-text" id="progressText">1 / 20</div>

        <div class="question-card">
          <div class="q-num" id="qNum">第 1 题</div>
          <div class="q-text" id="qText">加载中...</div>
          <div class="options" id="optionsContainer"></div>
        </div>

        <div class="nav-buttons">
          <button class="btn" id="prevBtn" disabled>← 上一题</button>
          <button class="btn primary" id="nextBtn">下一题 →</button>
        </div>
      </div>

      <!-- 结果区域 -->
      <div id="resultSection" class="hidden">
        <div class="result-card">
          <div class="food-badge" id="resultFoodName">热干面</div>
          <div class="food-sub" id="resultTrait">麻利爽快 · 江湖儿女型</div>

          <!-- 纯CSS美食图容器 -->
          <div class="food-illustration" id="foodIllustration"></div>

          <div class="desc" id="resultDesc"></div>
          <div class="wuhan-slang" id="resultSlang"></div>

          <button class="btn primary restart-btn" id="restartBtn">
            🔁 再测一回
          </button>
        </div>
      </div>
      <div class="footer">—— 拐子, 蛮有味！——</div>
    </div>

    <script>
          (function(){
              "use strict";
      // ---------- 题库 (20题) ----------
              const questions = [
                  { q: "早上出门发现下雨了，你忘带伞，这时你会？", opts: ["看看雨不大，直接快步冲进雨里赶路。", "退回屋里等一会儿，或者想办法找人借一把。", "在门口站一会儿，顺便观察雨里来来往往的人。", "掏出手机拍一张雨景，发个朋友圈配一句心情。"] },
                  { q: "朋友心情不好，约你出来坐坐，你通常会？", opts: ["先不问怎么了，直接带对方去吃一顿热乎的。", "认真听完对方的苦恼，然后帮忙分析该怎么办。", "坐在旁边安静陪着，偶尔递张纸巾。", "讲几个自己最近的倒霉事，让对方觉得“原来不止我惨”。"] },
                  { q: "早上起晚了，上班/上学眼看要迟到，但你点的一碗热干面、一个面窝、一杯蛋酒刚端到手，你会？", opts: ["筷子一拌，小拇指勾起面窝和蛋酒的袋子，边走边吃，脚底生风。", "迟到就迟到，坐下来慢慢吃，早餐不吃完一天都冒得劲。", "犹豫了三秒，最后选择端着碗站在店门口飞快扒完。", "把面窝和蛋酒退了，只揣着热干面边跑边吃。"] },
                  { q: "你更欣赏下面哪种生活态度？", opts: ["日子是过出来的，不是想出来的。", "哪怕一个人，也要把生活过得有滋有味。", "平平淡淡才是真，安稳最重要。", "人生苦短，什么都想试一下。"] },
                  { q: "如果要你用一种植物形容自己，你更倾向？", opts: ["竹子——长得快，直来直去。", "含羞草——看起来不起眼，一碰就反应很大。", "桂花——小小的，但香味飘得很远。", "仙人掌——外表带刺，内心柔软，活得久。"] },
                  { q: "排队的时候前面有人插队，你通常会？", opts: ["直接拍对方肩膀：“你好，麻烦排队。”", "心里不爽，但嘴上不说，默默翻个白眼。", "和旁边的陌生人交换一个无奈的眼神。", "观察一下对方是不是有急事，如果是就算了。"] },
                  { q: "别人眼中的你，最可能具备哪种特质？", opts: ["靠谱，有你在就不慌。", "有趣，总能说出冷到好笑的梗。", "体贴，你总能注意到别人的小情绪。", "有主见，你很少随大流。"] },
                  { q: "过江的时候，轮渡还有一分钟就要开了，你离闸口还有五十米，你会？", opts: ["撒腿就跑，边跑边喊“师傅等一哈！”", "犹豫了一秒，跑了两步，看到闸门在关了，停下来喘口气：“算鸟，下一班。”", "小跑两步，如果闸口师傅看了你一眼你就继续跑，没看就算了。", "脚步完全没变，甚至还有点想笑：“跑么斯跑，赶不上奏赶不上咧。”"] },
                  { q: "你和朋友约好时间见面，结果对方迟到了半小时，你会？", opts: ["有点烦躁，但对方来了以后很快就不计较了。", "嘴上说“没事”，但见面后的前十分钟会故意冷淡一点。", "坐在原地安安静静地等，甚至带了本书看。", "自己去附近逛了一圈，等对方打电话再回来。"] },
                  { q: "哪种类型的电影更打动你？", opts: ["市井烟火气很浓的，比如讲老街坊邻居的故事。", "反转很多的，结局让你完全想不到。", "节奏很慢的，没什么大起大落但看完心里很暖。", "小众独立的，甚至有点怪，但某一点特别戳你。"] },
                  { q: "如果给你一个空闲的下午，学一项新技能，你更想学？", opts: ["一种很实用的生活技能，比如修理家电。", "一种可以一个人安静做的事，比如拼图或烘焙。", "一种能和别人分享的东西，比如泡茶或调酒。", "一种没什么用但很有趣的东西，比如用口哨吹完整首歌。"] },
                  { q: "夏天晚上，街边大排档坐满了光膀子的拐子和扯着嗓子咵天的嫂子，你被安排在一桌陌生人旁边拼桌，你会？", opts: ["无所谓，该吃吃该喝喝，隔壁桌声音大你也跟着笑两声。", "有点不自在，但埋头苦吃，吃完赶紧撤。", "吃了几口发现隔壁桌在聊你也感兴趣的话题，忍不住插了句嘴。", "让老板给你换个角落的位置，能躲远点就躲远点。"] },
                  { q: "你觉得自己更偏向哪一种人？", opts: ["行动派——想到了就会去做。", "感受派——很在意当下的氛围和情绪。", "习惯派——有自己固定的节奏和喜好。", "探索派——容易被新鲜事物吸引。"] },
                  { q: "深夜睡不着的时候，你通常会？", opts: ["起来找点东西吃，吃完躺回去继续睡。", "戴上耳机听点东西，或者刷一会儿视频。", "脑子里开始想一些白天没想通的事情。", "干脆不睡了，爬起来做点白天没空做的事。"] },
                  { q: "朋友用一句话形容你的“情感浓度”，你觉得更接近？", opts: ["看着淡淡的，但时间越久越离不开。", "平时不声不响，但关键时刻一定在。", "外表硬邦邦的，打开以后全是汁水。", "就像冬天喝的那一口，烫嘴但舍不得放。"] },
                  { q: "旅行的方式，你更喜欢？", opts: ["不做太细的攻略，到了当地再随机应变。", "提前把想吃的东西列好，按清单打卡。", "找一个舒服的地方待着，不一定非要去景点。", "专门去那些攻略上很少提到的小众地方。"] },
                  { q: "在朋友圈里，你更常扮演什么角色？", opts: ["攒局的人，大家因为你才聚在一起。", "捧场的人，谁发动态你都会认真回应。", "潜水的人，偶尔冒泡点赞，很少自己发。", "分享的人，喜欢把看到的好玩东西转给大家。"] },
                  { q: "你认为“一个人成熟的标志”更接近？", opts: ["不再轻易被情绪左右，能扛得住事。", "开始能享受独处，不再害怕一个人。", "学会了照顾别人的感受，不再只想着自己。", "接受了有些事情就是无法改变，但仍做好自己。"] },
                  { q: "如果要用一种质感来形容你这个人，你会选？", opts: ["粗粝的——不光滑，但很实在。", "软糯的——温和，没有攻击性。", "酥脆的——边界分明，一碰就碎。", "绵密的——需要时间慢慢化开。"] },
                  { q: "最后，你希望自己给周围人留下的印象是？", opts: ["一个可以依靠的人。", "一个很有意思的人。", "一个让人觉得舒服的人。", "一个独一无二的人。"] }
              ];

              // 计分映射 (特质ID 1~16)
              const scoreMap = [
                  [1,10,2,9], [6,14,16,3], [1,12,8,4], [1,5,10,13], [1,2,11,13],
                  [1,14,7,16], [7,6,16,13], [1,10,8,9], [1,15,2,9], [7,6,16,13],
                  [7,2,8,5], [7,14,6,13], [1,2,12,9], [3,11,15,4], [12,7,6,16],
                  [9,4,10,13], [1,11,14,8], [12,2,16,9], [7,10,13,15], [7,6,11,13]
              ];

              // 美食数据库
              const foods = {
                  1: { name:"热干面", trait:"麻利爽快 · 江湖儿女型", desc:"你奏是个典型的武汉伢脾气——风风火火，最见不得人磨洋工。早上赶地铁、过江、端碗面边走边拌，一气呵成。朋友们都晓得，你嘴巴可能有点“拐”，但心是蛮热滴。活结，跟你交朋友，就像大清早搞碗热干面，扎实、管饱、不扯野棉花。", slang:"“个斑马，走快点撒！面都要憨（han，坨）了！”", cssClass:"food-reganmian" },
                  2: { name:"鲜鱼糊汤粉", trait:"细腻讲究 · 敏感慢热型", desc:"你看似温和好说话，其实心里门槛蛮高。就像糊汤粉那口汤，看着白汪汪，其实是熬了一晚上的鱼骨头，鲜得很，也烫得很。蒜鸟，一般人不懂你的好，但懂的人恨不得天天往你那里凑。", slang:"“莫看我白，我心里有数滴很。”", cssClass:"food-hutangfen" },
                  3: { name:"苕面窝", trait:"简单知足 · 纯粹乐天型", desc:"苕？对，你就是有点“苕”气，可爱滴苕！你冒得那多弯弯绕绕，开心奏是开心。你就像红薯丁炸的面窝，甜丝丝、脆嘣嘣，简单，但是少不了。", slang:"“苕点怕么斯？做人咧，最紧要系开心！”", cssClass:"food-shaomianwo" },
      						4: { name:"生烫牛肉粉", trait:"鲜活灵敏 · 冲动上头型", desc:"活结，你反应太快了！脑子比生烫牛肉下锅还抢时间。新鲜、滚烫、有冲劲。你说风奏是雨，想到什么马上奏要去搞。", slang:"“趁热！紧个么斯紧，再紧汤都凉了！”", cssClass:"food-beefnoodles" },
                  5: { name:"欢喜坨", trait:"乐天知命 · 心大福大型", desc:"你奏是个标准的欢喜坨！心里不装事，脸上一团和气。蒜鸟蒜鸟，冒得么大事是一顿宵夜解决不了的。", slang:"“欢喜坨，麻圆子，滚到哪边都甜滋滋。”", cssClass:"food-huanxituo" },
                  6: { name:"糯米鸡", trait:"内有乾坤 · 闷骚宝藏型", desc:"外表看着就是一坨炸米，不显山不露水。但是活结，跟你熟了才晓得，肚子里有货啊！", slang:"“莫看我外面枯（ku，焦），里头全是宝。”", cssClass:"food-nuomiji" },
                  7: { name:"汽水包", trait:"朴实可靠 · 抗饿耐用型", desc:"不花哨，不作妖，四四方方往那一杵，奏让人心里踏实。工作交给你，你说“冒得问题”。蛮扎实！", slang:"“你放心，这个事包在我身上，靠得住！”", cssClass:"food-qishuibao" },
                  8: { name:"三鲜豆皮", trait:"周全包容 · 全能扛把子型", desc:"你是个场面人。外表金黄亮爽，里子又有笋丁、香菇、干子。有你在的局，谁都莫想被冷落。", slang:"“莫慌莫慌，大家都有份，一个都不落下。”", cssClass:"food-doupi" },
                  9: { name:"糯米包油条", trait:"灵活自由 · 不按套路型", desc:"你就是“甜咸之争”的终结者。管它甜滴咸滴，能包进克滴奏是好滴。", slang:"“管它甜滴咸滴，能包进克滴奏是好滴。”", cssClass:"food-nuomibaoyoutiao" },
                  10: { name:"米粑粑", trait:"温柔绵软 · 人畜无害型", desc:"软乎乎、甜丝丝、热腾腾。蒜鸟，这个急躁的社会，奏缺你这样温柔的人。", slang:"“乖，莫急，慢慢来，先七口甜的垫哈。”", cssClass:"food-mibaba" },
                  11: { name:"蛋酒", trait:"治愈甜美 · 小太阳型", desc:"米酒滚烫地冲进蛋花里，甜甜的，滑滑的。有你在的场合绝对不会冷场。", slang:"“来，搞碗蛋酒喝哈，喝了就不冷了。”", cssClass:"food-danjiu" },
                  12: { name:"鸡冠饺", trait:"老派坚守 · 念旧情怀型", desc:"喜欢老东西、老地方、老交情。样子土里土气，但嚼劲十足，回味悠长。", slang:"“奏要这个味！新板眼我还吃不惯咧！”", cssClass:"food-jiguanjiao" },
                  13: { name:"长沙臭豆腐", trait:"反差个性 · 暗黑魅力型", desc:"个斑马，你就是个外码子气质，黑漆妈漆的。但是来武汉玩滴人都晓得，来武汉不qi长沙臭豆腐等于白来！", slang:"“闻着滂，qi着香，活结，莫光看外表撒！”", cssClass:"food-stinkytofu" },
                  14: { name:"汤包", trait:"矜持内涵 · 内秀慢热型", desc:"你这个人，蛮金贵，轻易不开腔。不懂你的人一口咬下克，烫得直叫；懂你的人会小心翼翼对待你。", slang:"“莫急莫急，小口嗦，烫到鸟我不管啊。”", cssClass:"food-tangbao" },
                  15: { name:"重油烧梅", trait:"浓烈深情 · 爱憎分明型", desc:"爱奏爱得死心塌地，恨奏恨得咬牙切齿。胡椒味重，油水足，蛮顶。", slang:"“奏是这个胡椒味！不辣不呛那还叫么斯烧梅？”", cssClass:"food-shaomei" },
                  16: { name:"排骨藕汤", trait:"温暖长情 · 家的味道型", desc:"平时想不起来，到了冬天、受了委屈，第一个想到的奏是你。铫子咕嘟咕嘟冒着热气，家奏在。", slang:"“七了冇？冇七的话，来屋里喝碗藕汤。”", cssClass:"food-ou-tang" }
              };

              // 状态
              let currentIndex = 0;
              let answers = new Array(20).fill(null);
              let traitScores = new Array(17).fill(0);
              let quizFinished = false;

              const quizSection = document.getElementById('quizSection');
              const resultSection = document.getElementById('resultSection');
              const qText = document.getElementById('qText');
              const qNum = document.getElementById('qNum');
              const optionsDiv = document.getElementById('optionsContainer');
              const prevBtn = document.getElementById('prevBtn');
              const nextBtn = document.getElementById('nextBtn');
              const progressBar = document.getElementById('progressBar');
              const progressText = document.getElementById('progressText');
              const restartBtn = document.getElementById('restartBtn');

              function renderQuestion(index) {
                  const q = questions[index];
                  qText.textContent = q.q;
                  qNum.textContent = `第 ${index+1} 题`;
                  const selectedIdx = answers[index];

                  optionsDiv.innerHTML = '';
                  q.opts.forEach((opt, optIdx) => {
                      const btn = document.createElement('div');
                      btn.className = 'option' + (selectedIdx === optIdx ? ' selected' : '');
                      btn.textContent = `${String.fromCharCode(65+optIdx)}. ${opt}`;
                      btn.addEventListener('click', () => selectOption(index, optIdx));
                      optionsDiv.appendChild(btn);
                  });

                  prevBtn.disabled = (index === 0);
                  const isLast = (index === questions.length-1);
                  nextBtn.textContent = isLast ? '看结果 🎉' : '下一题 →';

                  const progress = ((index+1)/questions.length)*100;
                  progressBar.style.width = progress + '%';
                  progressText.textContent = `${index+1} / ${questions.length}`;
              }

              function selectOption(qIdx, optIdx) {
                  answers[qIdx] = optIdx;
                  renderQuestion(qIdx);
              }
      function calculateResult() {
                  traitScores.fill(0);
                  for(let i=0; i<20; i++) {
                      const ans = answers[i];
                      if(ans !== null) {
                          const traitId = scoreMap[i][ans];
                          traitScores[traitId]++;
                      }
                  }
                  let maxScore = -1, bestTrait = 1;
                  for(let i=1; i<=16; i++) {
                      if(traitScores[i] > maxScore) {
                          maxScore = traitScores[i];
                          bestTrait = i;
                      }
                  }
                  return bestTrait;
              }

              function showResult() {
                  const traitId = calculateResult();
                  const food = foods[traitId];

                  document.getElementById('resultFoodName').textContent = food.name;
                  document.getElementById('resultTrait').textContent = food.trait;
                  document.getElementById('resultDesc').textContent = food.desc;
                  document.getElementById('resultSlang').textContent = food.slang;

                  const illDiv = document.getElementById('foodIllustration');
                  illDiv.innerHTML = `<div class="css-food ${food.cssClass}">${getFoodIllustration(traitId)}</div>`;

                  quizSection.classList.add('hidden');
                  resultSection.classList.remove('hidden');
                  window.scrollTo({ top: 0, behavior: 'smooth' });
              }

              function getFoodIllustration(id) {
                  const map = {
                      1: '<div class="bowl"></div><div class="noodles"></div><div class="sesame"></div>',
                      2: '<div class="bowl"></div><div class="noodles"></div><div class="soup"></div>',
                      3: '<div class="donut"></div>',
                      4: '<div class="bowl"></div><div class="noodles"></div><div class="beef-slices"><div class="beef"></div><div class="beef"></div><div class="beef"></div></div>',
                      5: '<div class="ball"></div>',
                      6: '<div class="lump"></div>',
                      7: '<div class="bun"></div>',
                      8: '<div class="square"></div>',
                      9: '<div class="roll"></div>',
                      10: '<div class="pair"><div class="cake"></div><div class="cake"></div></div>',
                      11: '<div class="cup"></div>',
                      12: '<div class="cockscomb"></div>',
                      13: '<div class="tofu-block"></div>',
                      14: '<div class="basket"></div>',
                      15: '<div class="siu-mai"></div>',
                      16: '<div class="pot"></div>'
                  };
                  return map[id] || '';
              }

              function restartQuiz() {
                  currentIndex = 0;
                  answers = new Array(20).fill(null);
                  quizFinished = false;
                  resultSection.classList.add('hidden');
                  quizSection.classList.remove('hidden');
                  renderQuestion(0);
              }

              // 事件
              prevBtn.addEventListener('click', () => {
                  if(currentIndex > 0) {
                      currentIndex--;
                      renderQuestion(currentIndex);
                  }
              });

              nextBtn.addEventListener('click', () => {
                  if(answers[currentIndex] === null) {
                      alert('活结，选个答案撒！');
                      return;
                  }
                  if(currentIndex < questions.length-1) {
                      currentIndex++;
                      renderQuestion(currentIndex);
                  } else {
                      quizFinished = true;
                      showResult();
                  }
              });

              restartBtn.addEventListener('click', restartQuiz);

              // 初始化
              renderQuestion(0);
          })();
    </script>
  </body>
</html>
